# Apache2 Reverse Proxy Configuration for ADAM MCP Server
#
# This configuration should be added to your existing Apache2 virtual host
# or created as a separate site configuration file.
#
# Installation:
# 1. Copy this file to /etc/apache2/sites-available/adam-mcp.conf
# 2. Enable required modules: sudo a2enmod proxy proxy_http headers
# 3. Enable the site: sudo a2ensite adam-mcp
# 4. Reload Apache: sudo systemctl reload apache2
#
# Alternatively, add the <Location> block below to your existing ADAM virtual host

<VirtualHost *:443>
    # Update these with your actual domain details
    ServerName yourschool.adam.co.za
    ServerAdmin admin@yourschool.edu

    # SSL Configuration (adjust paths as needed)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/yourschool.crt
    SSLCertificateKeyFile /etc/ssl/private/yourschool.key
    # SSLCertificateChainFile /etc/ssl/certs/chain.crt

    # Existing ADAM application configuration would go here
    # DocumentRoot /var/www/adam
    # ...

    # MCP Server Reverse Proxy Configuration
    <Location /adam-mcp>
        # Proxy to the local MCP server
        ProxyPass http://127.0.0.1:8000/mcp
        ProxyPassReverse http://127.0.0.1:8000/mcp

        # Preserve headers
        ProxyPreserveHost On
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Prefix "/adam-mcp"

        # Handle WebSocket/SSE connections for Streamable HTTP
        ProxyPass http://127.0.0.1:8000/mcp upgrade=websocket
        ProxyAddHeaders On

        # Security headers
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"

        # Optional: Restrict access to specific IPs or networks
        # Require ip 192.168.1.0/24
        # Require ip 10.0.0.0/8
    </Location>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/adam-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/adam-mcp-access.log combined
</VirtualHost>

# HTTP to HTTPS redirect (optional but recommended)
<VirtualHost *:80>
    ServerName yourschool.adam.co.za

    # Redirect all HTTP traffic to HTTPS
    Redirect permanent / https://yourschool.adam.co.za/
</VirtualHost>
